services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: analytics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d analytics"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    env_file: .env.example
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/analytics
      MCP_SQL_SERVER_URL: http://mcp_sql:8101
      MCP_ANALYTICS_SERVER_URL: http://mcp_analytics:8102
      MCP_CHART_SERVER_URL: http://mcp_charts:8103
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mcp_sql:
        condition: service_started
      mcp_analytics:
        condition: service_started
      mcp_charts:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  mcp_sql:
    build: .
    command: uvicorn mcp_servers.sql_server.server:app --host 0.0.0.0 --port 8101
    env_file: .env.example
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/analytics
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8101:8101"

  mcp_analytics:
    build: .
    command: uvicorn mcp_servers.analytics_server.server:app --host 0.0.0.0 --port 8102
    env_file: .env.example
    ports:
      - "8102:8102"

  mcp_charts:
    build: .
    command: uvicorn mcp_servers.chart_server.server:app --host 0.0.0.0 --port 8103
    env_file: .env.example
    volumes:
      - ./artifacts:/app/artifacts
    ports:
      - "8103:8103"

volumes:
  pgdata:
